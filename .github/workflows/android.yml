name: Flutter CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Setup Java (required for Android)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ FIXED: Setup Flutter (IMPORTANT)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'   # 🔥 matches your SDK requirement
          channel: 'stable'

      # ✅ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # ✅ Analyze
      - name: Analyze project
        run: flutter analyze

      # ✅ Run tests
      - name: Run tests
        run: flutter test

      # ✅ Build APK
      - name: Build APK
        run: flutter build apk --release